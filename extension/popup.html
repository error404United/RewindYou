<!doctype html>
<html>
  <head>
    <title>RewindYou - Content Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="compact">
    <div class="popup">
      <h2 class="title">RewindYou - Content Extractor</h2>

        <div class="auth-box">
          <input id="emailInput" type="email" placeholder="Email" />
          <input id="passwordInput" type="password" placeholder="Password" />
          <button id="loginButton">Login</button>
          <div id="auth-status" class="muted"></div>
        </div>

        <div class="options">
          <button id="extractButton">Extract Page Data</button>
        </div>

        <div id="result">
          Click 'Extract Page Data' to extract content and metadata from the
          current webpage.
        </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
